<!DOCTYPE html>
<html lang="pt">

<head>
    <title>J. SHAYEB CONCETTA CLONE</title>
    <link rel="stylesheet" href="./assets/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <div id="header-placeholder"></div>

    <main id="conteudo-principal"></main>

    <div id="footer-placeholder"></div>

    <div class="faleconosco">
        <a href=mailto:jshayeb@jshayeb.com.br><img src="./assets/btfaleconosco.png" class="imgfaleconosco"></a>
    </div>
    <script>
        function loadComponent(id, file) {
            return fetch(file)
                .then(response => response.text())
                .then(data => {
                    document.getElementById(id).innerHTML = data;
                });
        }

        function carregarConteudo(nomePagina) {
            const arquivo = nomePagina.endsWith('.html') ? nomePagina : `${nomePagina}.html`;
            fetch(arquivo)
                .then(res => res.text())
                .then(html => {
                    document.getElementById('conteudo-principal').innerHTML = html;
                    window.scrollTo(0, 0);
                })
                .catch(err => console.error(err));
        }

        function navegar(event, urlOriginal) {
            if (event.ctrlKey || event.metaKey) return;
            event.preventDefault();

            let pagina = urlOriginal.includes('?p=') ? urlOriginal.split('?p=')[1] : urlOriginal;
            pagina = pagina.replace('.html', '');

            carregarConteudo(pagina);
            window.history.pushState({ pagina: pagina }, '', `index.html?p=${pagina}`);
        }

        window.addEventListener('popstate', (event) => {
            const pageToLoad = (event.state && event.state.pagina) ? event.state.pagina : 'principal';
            carregarConteudo(pageToLoad);
        });

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const pageToLoad = urlParams.get('p') || 'principal';

            Promise.all([
                loadComponent('header-placeholder', 'menu.html'),
                loadComponent('footer-placeholder', 'footer.html'),
                loadComponent('conteudo-principal', `${pageToLoad}.html`)
            ]);

            window.history.replaceState({ pagina: pageToLoad }, '', window.location.href);
        });
    </script>

<script>
    document.addEventListener('click', function (e) {
        const menu = document.querySelector('.menulateral');
        const btn = document.querySelector('#hamburger');

        // LÓGICA PARA ABRIR/FECHAR NO BOTÃO
        const btnClick = e.target.closest('#hamburger');
        if (btnClick) {
            console.log("Botão hamburguer clicado!");
            menu.classList.toggle('active');
            btn.classList.toggle('active');
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'initial';
        }

        // LÓGICA PARA FECHAR AO CLICAR EM UM LINK
        if (e.target.closest('.menulateral a')) {
            console.log("Link do menu clicado!");
            if (menu) {
                // Em vez de style.left, apenas removemos a classe active
                menu.classList.remove('active');
                if(btn) btn.classList.remove('active');
                document.body.style.overflow = 'initial';
            }
        }
    });
</script>
    
</body>

</html>
